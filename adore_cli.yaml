# ADORe CLI Docker Compose Services Configuration
# 
# This file defines the core ADORe CLI development environment service:
# - adore_cli: Complete three-layer development environment with tools and GUI support
# - zenoh:     Optional Zenoh ROS2 DDS bridge (enabled via ZENOH_ENABLE=true in adore_cli.env)
#
# The three-layer architecture provides:
# - Base foundation: OS + ROS2 foundation (user-agnostic, highly cacheable)
# - Core environment: Complete ROS2 tools + all dependencies (user-agnostic, shareable)
# - User layer: .deb packages (user-agnostic, user account created at runtime by entrypoint)

x-common-config: &common-config
  privileged: false
  platform: ${DOCKER_PLATFORM:-linux/amd64}
  hostname: ${HOSTNAME:-ADORe-CLI}
  network_mode: "host"
  ipc: "host"
  pid: "host"

x-common-environment: &common-environment
  HOSTNAME: ${HOSTNAME:-ADORe-CLI}
  SOURCE_DIRECTORY: ${SOURCE_DIRECTORY}
  LOG_DIRECTORY: ${SOURCE_DIRECTORY}/.log/.adore_cli/
  ROS_HOME: ${SOURCE_DIRECTORY}/.log/.ros
  HISTFILE: /tmp/adore_cli/.zsh_history
  FASTDDS_BUILTIN_TRANSPORTS: UDPv4
  RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
  USER: ${USER}
  UID: ${USER_UID}
  GID: ${USER_GID}
  DISPLAY: ${DISPLAY:-:0}

x-common-build-args: &common-build-args
  HOSTNAME: ${HOSTNAME:-ADORe-CLI}
  ROS_DISTRO: ${ROS_DISTRO:-jazzy}
  OS_CODE_NAME: ${OS_CODE_NAME:-noble}
  BRANCH: ${ADORE_CLI_BRANCH}
  SHORT_HASH: ${ADORE_CLI_SHORT_HASH}
  PARENT_BRANCH: ${PARENT_BRANCH}
  PARENT_SHORT_HASH: ${PARENT_SHORT_HASH}
  ARCH: ${ARCH}

services:
  adore_cli:
    <<: *common-config
    image: ${ADORE_CLI_IMAGE}
    container_name: ${ADORE_CLI_CONTAINER_NAME}
    pull_policy: missing

    environment:
      <<: *common-environment
      ROS_DISTRO: ${ROS_DISTRO:-jazzy}
      ADORE_CLI_WORKING_DIRECTORY: ${ADORE_CLI_WORKING_DIRECTORY}
      TEST_SCENARIOS: ${TEST_SCENARIOS:-baseline_test.launch}
      ADORE_CLI_IMAGE: ${ADORE_CLI_IMAGE}
      ADORE_CLI_CORE_IMAGE: ${ADORE_CLI_CORE_IMAGE}
      ADORE_CLI_CONTAINER_NAME: ${ADORE_CLI_CONTAINER_NAME}

    build:
      context: ${ADORE_CLI_MAKEFILE_PATH}/adore_cli
      network: host
      dockerfile: ${ADORE_CLI_MAKEFILE_PATH}/adore_cli/Dockerfile.adore_cli
      args:
        <<: *common-build-args
        ADORE_CLI_CORE_IMAGE: ${ADORE_CLI_CORE_IMAGE}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /var/run/docker.sock:/var/run/docker.sock
      - ${ADORE_CLI_MAKEFILE_PATH}:/tmp/adore_cli
      - ${SOURCE_DIRECTORY}:/tmp/adore
      - ${SOURCE_DIRECTORY}:${SOURCE_DIRECTORY}
      - ${ADORE_CLI_MAKEFILE_PATH}/.ccache:/home/${USER}/.ccache
      - ${SOURCE_DIRECTORY}/.log/.adore_cli:/var/log/adore_cli
      - ${SOURCE_DIRECTORY}/.log:/var/log/ros2
      - ${SOURCE_DIRECTORY}/.log:/home/${USER}/.log
      - ${HOME}/.gitconfig:/home/${USER}/.gitconfig:ro
      - ${HOME}/.ssh:/home/${USER}/.ssh:ro

    extra_hosts:
      - "${HOSTNAME:-ADORe-CLI}:127.0.0.1"

  zenoh:
    profiles: [zenoh]
    image: ${ZENOH_IMAGE:-eclipse/zenoh-bridge-ros2dds:latest}
    container_name: ${ADORE_CLI_CONTAINER_NAME}_zenoh
    network_mode: "host"
    ipc: "host"
    pid: "host"
    restart: unless-stopped
    volumes:
      - ${ZENOH_CONFIG:-./zenoh_bridge_config.json5}:/tmp/zenoh_config.json5:ro
    command: >
      -c /tmp/zenoh_config.json5
      ${ZENOH_REST_ENABLE:+--rest-http-port ${ZENOH_REST_PORT:-8000}}
