# ADORe CLI Main Docker Compose Configuration
# 
# This is the primary compose file used by the Make targets.
# It extends service definitions from adore_cli.yaml and applies
# runtime configurations for different deployment scenarios.
#
# Usage:
#   - `make cli` uses the adore_cli service
#   - `make build` builds both services  
#   - `make clean` cleans both services
#
# Three-Layer Architecture:
#   The system now uses a three-layer approach for maximum efficiency:
#   1. System base: OS + ROS2 (user-agnostic, highly cacheable)
#   2. Core environment: Complete tools (user-agnostic, shareable)
#   3. User layer: User customization (thin, fast)
#   4. Runtime: Full development environment

# === SERVICE CONFIGURATION ===

services:
  # === LEGACY CORE SERVICE ===
  # Used for backward compatibility with existing workflows
  # Actually builds the user-customized layer, not the original "core"
  adore_cli_core:
    extends:
      file: adore_cli.yaml
      service: adore_cli_core
    profiles:
      # Prevent automatic startup with docker-compose up
      # This service is managed explicitly by Make targets
      - donotstart

  # === DEVELOPMENT SERVICE ===  
  # Full development environment - primary service for interactive use
  # Started automatically by `make cli` and related targets
  adore_cli:
    extends:
      file: adore_cli.yaml
      service: adore_cli
    # No profile restriction - this service can be started directly

# === USAGE PATTERNS ===
#
# MAKE TARGET INTEGRATION:
# - `make cli` → starts/attaches to adore_cli service
# - `make start` → starts adore_cli service in background  
# - `make stop` → stops all services
# - `make build` → builds all layers intelligently
#
# BUILD PROCESS:
# 1. System base layer: adore_cli_system:${BRANCH}_${SHORT_HASH}_${ARCH}
# 2. Core environment: adore_cli_core:${BRANCH}_${SHORT_HASH}_${ARCH}  
# 3. User layer: adore_cli_user:${BRANCH}_${SHORT_HASH}_${ARCH}_${USER}
# 4. Runtime layer: adore_cli:${COMPLEX_TAG}
#
# DIRECT DOCKER COMPOSE USAGE:
# - `docker compose up adore_cli` → starts development environment
# - `docker compose build` → builds runtime service (triggers layer builds)
# - `docker compose down` → stops and removes containers
#
# PROFILE USAGE:
# - adore_cli_core uses 'donotstart' profile to prevent accidental startup
# - Only adore_cli service starts with standard `docker compose up`
#
# DEVELOPMENT WORKFLOW:
# 1. Use `make cli` for normal development (recommended)
# 2. Use `make build` when Dockerfiles or requirements change
# 3. Use `make clean` to reset environment completely
# 4. Use `make build_status` to check layer status
#
# CACHING STRATEGY:
# - System and core layers are shared across users
# - Only user and runtime layers rebuild for user changes
# - Git commit changes rebuild all layers
# - Architecture changes rebuild all layers
