name: CI

on:
  push:
    branches: [ros2]
  pull_request:
    branches: [ros2]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up environment
        run: |
          echo "SOURCE_DIRECTORY=$(pwd)" >> $GITHUB_ENV
          echo "ADORE_CLI_WORKING_DIRECTORY=$(pwd)" >> $GITHUB_ENV
          echo "USER_UID=$(id -u)" >> $GITHUB_ENV
          echo "USER_GID=$(id -g)" >> $GITHUB_ENV
          echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV

      - name: Build
        run: make build && make save

      - name: Test
        run: make test

      - name: Push images
        if: github.event_name == 'push'
        run: make push_images
