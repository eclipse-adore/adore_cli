---
name: CI_native_arm64

on:
  push:
  pull_request:
    branches: [ ros2 ]

env:
  REGISTRY: ghcr.io
  GITHUB_REPOSITORY_LOWER: ${{ github.repository_owner }}

jobs:
  CI_native_arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Init
        run: |
          df -h
          sudo apt-get update

      - name: Free up disk space
        run: |
          echo "Initial disk usage:"
          df -h
          echo "Removing unnecessary packages and files..."
          
          sudo rm -rf /opt/hostedtoolcache 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android 2>/dev/null || true
          sudo rm -rf /opt/android 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet 2>/dev/null || true
          sudo rm -rf /opt/ghc 2>/dev/null || true
          sudo rm -rf /usr/local/.ghcup 2>/dev/null || true
          
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' '^mysql-.*' '^php.*' azure-cli google-cloud-sdk hhvm google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          
          docker image prune -af 2>/dev/null || true
          
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile /mnt/swapfile 2>/dev/null || true
          
          echo "Disk usage after cleanup:"
          df -h

      - name: Freespace Check
        run: |
          df -h
          REQUIRED_FREE_SPACE=25
          free_space=$(df -h . | awk '{print $4}' | grep "G")
          free_space="${free_space%G}"
          if [ -z "$free_space" ]; then
            echo "ERROR: free_space variable is empty or not set." >&2
            exit 1
          fi
          df -h
          echo "Free space (required): ${REQUIRED_FREE_SPACE} GB"
          echo "Free space (available): ${free_space} GB"
          if (( REQUIRED_FREE_SPACE > free_space )); then
            echo "ERROR: Insufficient free space: ${free_space} GB available, ${REQUIRED_FREE_SPACE} GB required." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up environment variables
        run: |
          echo "GITHUB_REPOSITORY_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "REGISTRY_PREFIX=ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/" >> $GITHUB_ENV

      - name: Install requirements
        run: |
          df -h
          sudo apt-get update
          sudo apt-get install -y make

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Try Pull Base Images from Registry
        run: |
          echo "Attempting to pull base and core images from registry..."
          make try_pull_base_images || echo "Base images not found in registry, will build locally"

      - name: Build
        run: |
          df -h
          make build
          make save_docker_images

      - name: CI Test
        run: |
          df -h
          make ci_test

      - name: Push Base and Core Images
        run: |
          echo "Pushing base and core images to registry..."
          make push_base_images
        if: github.event_name == 'push'

      - name: Cleanup Old Registry Images
        run: |
          echo "Cleaning up old images, keeping last 2 commits for ros2 branch..."
          make cleanup_registry_images
        if: github.ref == 'refs/heads/ros2' && github.event_name == 'push'

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-arm64
          path: .log
        if: always()
