---
name: ADORe CLI CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  x86_64:
    name: Native x86_64

    secrets: inherit
    
    uses: ./.github/workflows/reuse-build.yaml
    with:
      platform: 'ubuntu-latest'
      architecture: 'x86_64'
      archive_name: 'logs-x86'

  arm64:
    name: Native ARM64

    secrets: inherit
    
    uses: ./.github/workflows/reuse-build.yaml
    with:
      platform: 'ubuntu-24.04-arm'
      architecture: 'arm64'
      archive_name: 'logs-arm64'
